<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Copy AutoTouch Script</title>
  <style>
    body {
      font-family: monospace;
      background: #f5f5f5;
      padding: 40px;
    }
    textarea {
      width: 100%;
      height: 450px;
      padding: 15px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 5px;
      resize: vertical;
      box-sizing: border-box;
      background: #fdfdfd;
    }
    .button {
      margin: 10px 5px 10px 0;
      padding: 10px 20px;
      font-size: 14px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .button:hover {
      background: #0056b3;
    }
    #copyMsg {
      margin-left: 10px;
      color: green;
      display: none;
    }
  </style>
</head>
<body>

  <!-- 🔗 Nút tạo file update.lua -->
  <a href="https://127.0.0.1/file/new?path=%2F%2Fupdate.lua" class="button" target="_blank">
    🔗 Ấn tạo
  </a>
  <a href="https://127.0.0.1" class="button" target="_blank">
    🔗 REMOTE
  </a>
  <!-- ❌ Nút xóa file update.lua -->
  <a href="https://127.0.0.1/file/delete?path=%2Fupdate.lua" class="button" target="_blank" style="background: #dc3545;">
    ❌ Xoá Update
  </a>

  <!-- Vùng hiển thị mã Lua -->
  <textarea id="code" readonly>
local curl = require("lcurl")
local zipUrl     = "http://ttmal.net/att/auto_gg_less.zip"
local savePath      = "/var/jb/var/mobile/Library/AutoTouch/Scripts/auto_gg_less.zip"
local extractTo     = "/var/jb/var/mobile/Library/AutoTouch/Scripts"
-- Hàm tải file zip
local function downloadFile(url, savePath)
    local file = io.open(savePath, "wb")
    assert(file, "Không thể tạo file: " .. savePath)
    local easy = curl.easy{
        url = url,
        writefunction = function(data)
            file:write(data)
            return #data
        end
    }
    local ok, err = pcall(function() easy:perform() end)
    easy:close()
    file:close()
    return ok, err
end
-- Tải auto_gg.zip
local ok1, err1 = downloadFile(zipUrl, savePath)
if ok1 then
    -- Giải nén cả hai
    local unzip1 = string.format('unzip -o "%s" -d "%s"', savePath, extractTo)
    execute(unzip1)
    -- Xóa file zip bằng lệnh rm
    execute('rm -f "' .. savePath .. '"')
    toast("Successfully updated!", 5)
else
    toast("Error updated: " .. (err1 or err2 or " null"), 3)
end
  </textarea>
  <!-- 📋 Nút sao chép -->
  <button class="button" onclick="copyCode()">📋 Copy</button>
  <span id="copyMsg">✔ Đã sao chép!</span>

  <script>
    function copyCode() {
      const code = document.getElementById("code").value;
      navigator.clipboard.writeText(code).then(() => {
        const msg = document.getElementById("copyMsg");
        msg.style.display = "inline";
        setTimeout(() => msg.style.display = "none", 2000);
      }).catch(err => {
        alert("❌ Lỗi khi sao chép!");
        console.error(err);
      });
    }
  </script>
</body>
</html>
