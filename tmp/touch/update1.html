<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Copy AutoTouch Script</title>
  <style>
    body {
      font-family: monospace;
      background: #f5f5f5;
      padding: 40px;
    }
    textarea {
      width: 100%;
      height: 450px;
      padding: 15px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 5px;
      resize: vertical;
      box-sizing: border-box;
      background: #fdfdfd;
    }
    .button {
      margin: 10px 5px 10px 0;
      padding: 10px 20px;
      font-size: 14px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .button:hover {
      background: #0056b3;
    }
    #copyMsg {
      margin-left: 10px;
      color: green;
      display: none;
    }
  </style>
</head>
<body>

  <!-- 🔗 Nút tạo file update.lua -->
  <a href="https://127.0.0.1/file/new?path=%2F%2Fupdate.lua" class="button" target="_blank">
    🔗 Ấn tạo
  </a>
  <a href="https://127.0.0.1" class="button" target="_blank">
    🔗 REMOTE
  </a>
  <!-- ❌ Nút xóa file update.lua -->
  <a href="https://127.0.0.1/file/delete?path=%2Fupdate.lua" class="button" target="_blank" style="background: #dc3545;">
    ❌ Xoá Update
  </a>

  <!-- Vùng hiển thị mã Lua -->
  <textarea id="code" readonly>
local url = "https://kieunhutrung1.github.io/hide/debs/update.zip"
local zipPath = rootDir() .. "/update.zip"
local extractTo = rootDir()
--Hàm kiểm tra file tồn tại
function fileExists(filePath)
  local f = io.open(filePath, "r")
  if f then f:close() return true else return false end
end
--Tải file bằng curl
toast("Đang tải file...")
local cmd = string.format('curl -k -L "%s" -o "%s"', url, zipPath)
execute(cmd)
--Kiểm tra
if fileExists(zipPath) then
  execute("rm -r "..rootDir() .."/Debug/*")
  execute("rm -r "..rootDir() .."/img/*")
  execute("rm -r "..rootDir() .."/WhatIsAutoTouch.at")
  execute("rm -r "..rootDir() .."/Examples")
  --execute("rm -r "..rootDir() .."/libs/*")
  toast("Tải thành công!", 2)
  --Giải nén nếu file tồn tại
  toast("Đang giải nén...")
  local unzipCmd = string.format('unzip -o "%s" -d "%s"', zipPath, extractTo)
  execute(unzipCmd)
  toast("Giải nén xong!", 5)
  -- Xóa file zip nếu muốn:
  os.remove(zipPath)
else
  toast("Không tìm thấy file sau khi tải!", 5)
end
  </textarea>

  <!-- 📋 Nút sao chép -->
  <button class="button" onclick="copyCode()">📋 Copy</button>
  <span id="copyMsg">✔ Đã sao chép!</span>

  <script>
    function copyCode() {
      const code = document.getElementById("code").value;
      navigator.clipboard.writeText(code).then(() => {
        const msg = document.getElementById("copyMsg");
        msg.style.display = "inline";
        setTimeout(() => msg.style.display = "none", 2000);
      }).catch(err => {
        alert("❌ Lỗi khi sao chép!");
        console.error(err);
      });
    }
  </script>
</body>
</html>
